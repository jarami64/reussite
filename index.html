<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Réussite</title>
<style>
body{background:#076324;color:white;font-family:Arial,sans-serif;
     text-align:center;margin:0;padding:8px;-webkit-tap-highlight-color:transparent;}
h1{font-size:20px;margin:0 0 6px}
#controls{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
button{padding:8px 14px;border:none;border-radius:7px;font-size:13px;
       font-weight:bold;cursor:pointer;-webkit-appearance:none}
button:disabled{opacity:.4}
#btn-new{background:#f0c040;color:#333}
#btn-analyze{background:#4488ff;color:white}
#btn-hint{background:#44cc66;color:white}
#board{display:inline-block}
#board table{border-collapse:separate}
td{padding:0;vertical-align:top}
.card{background:white;border:1.5px solid #bbb;border-radius:5px;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:2px 3px;overflow:hidden;cursor:pointer;
      box-shadow:1px 2px 3px rgba(0,0,0,.3);font-weight:bold;position:relative;}
.card.red{color:#cc0000}.card.black{color:#111}
.card.sel{border:2.5px solid #fc0 !important;box-shadow:0 0 8px #fc0;transform:translateY(-3px)}
.card.hint{border:2.5px solid #4e6 !important;box-shadow:0 0 8px #4e6;transform:translateY(-3px)}
.gap{border-radius:5px;background:rgba(0,0,0,.18);border:1.5px dashed rgba(255,255,255,.3);cursor:pointer}
.gap.ok{background:rgba(255,255,80,.2);border:2px dashed #fc0;
        box-shadow:0 0 6px rgba(255,204,0,.5);animation:py 1s infinite alternate}
@keyframes py{from{background:rgba(255,255,80,.1)}to{background:rgba(255,255,80,.35)}}
.gap.hdst{background:rgba(80,255,120,.2);border:2px dashed #4e6;
          box-shadow:0 0 6px rgba(68,238,102,.5);animation:pg 1s infinite alternate}
@keyframes pg{from{background:rgba(80,255,120,.1)}to{background:rgba(80,255,120,.35)}}
.gap.dov{background:rgba(255,255,80,.5)!important;border-color:#ff0!important}
.mid{text-align:center;line-height:1}
.mf{position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
.fb{width:100%;flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:0}
#msg{margin-top:8px;font-weight:bold;font-size:15px;min-height:22px}
#sub{font-size:11px;opacity:.8;margin-top:3px;min-height:16px}
#info{font-size:10px;opacity:.55;margin-top:5px;line-height:1.5}
#diag{font-size:11px;color:#8f8;margin-bottom:4px;min-height:14px}
#gh{position:fixed;pointer-events:none;z-index:200;display:none;
    border-radius:5px;overflow:hidden;font-weight:bold;background:white;
    flex-direction:column;justify-content:space-between;padding:2px 3px;opacity:.82}
</style>
</head>
<body>
<noscript>
<div style="background:#c00;color:white;padding:12px;font-size:14px;border-radius:6px;margin-bottom:8px">
  JavaScript desactive. Ouvrez ce fichier dans Safari.
</div>
</noscript>
<div id="diag"></div>
<h1>&#9824; Reussite &#9829;</h1>
<div id="controls">
  <button id="btn-new"     onclick="newGame()">Nouvelle Partie</button>
  <button id="btn-analyze" onclick="analyzeGame()" disabled>Analyser</button>
  <button id="btn-hint"    onclick="showHint()" disabled>Conseil</button>
</div>
<div id="board"></div>
<div id="msg"></div>
<div id="sub"></div>
<div id="info">
  Touchez ou faites glisser une carte. Espace jaune = depot valide.<br>
  Debut de rangee : n'importe quel 2. Apres une carte : suivante de meme couleur.
</div>
<div id="gh"></div>
<script>
document.getElementById('diag').textContent = 'JavaScript actif';
window.onerror = function(msg, src, line) {
  document.getElementById('diag').style.color = '#f88';
  document.getElementById('diag').textContent = 'Erreur JS: ' + msg + ' (l.' + line + ')';
};

var SUITS = ['♥','♦','♣','♠'];
var RED   = [true, true, false, false];
var RANKS = ['','','2','3','4','5','6','7','8','9','10','V','D','R'];
var FICON = {11: ['♘','♞'], 12: ['♕','♛'], 13: ['♔','♚']};
var FNAME = {11:'Valet', 12:'Dame', 13:'Roi'};
var FBG   = [
  'linear-gradient(150deg,#ffe0e0,#ffc8c8)',
  'linear-gradient(150deg,#ffe8d0,#ffd0b0)',
  'linear-gradient(150deg,#d8e8ff,#c0d4f8)',
  'linear-gradient(150deg,#e0d8f8,#c8c0ee)'
];

var CW = 52, CH = 72, FS = 9, FSS = 16, FSF = 20, FSL = 7, SPC = 3;

function calcSize() {
  var w = window.innerWidth - 16;
  if (w > 900) w = 900;
  SPC = w > 600 ? 4 : 3;
  CW  = Math.min(64, Math.floor((w - SPC * 12) / 13));
  CH  = Math.round(CW * 90 / 64);
  FS  = Math.max(7, Math.round(CW * 11 / 64));
  FSS = Math.max(10, Math.round(CW * 20 / 64));
  FSF = Math.max(10, Math.round(CW * 23 / 64));
  FSL = Math.max(5, Math.round(CW * 8 / 64));
}
calcSize();
window.addEventListener('resize', function() { calcSize(); render(); });

var board = [], sel = null, vtg = [], hint = null, busy = false;

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function mkBoard() {
  var d = [];
  for (var s = 0; s < 4; s++)
    for (var v = 2; v <= 13; v++)
      d.push({s: s, v: v});
  d.push(null, null, null, null);
  shuffle(d);
  var b = [];
  for (var r = 0; r < 4; r++) b.push(d.slice(r * 13, r * 13 + 13));
  return b;
}

function canPlace(card, gr, gc, b) {
  if (gc === 0) return card.v === 2;
  var L = b[gr][gc - 1];
  if (!L || L.v === 13) return false;
  return L.s === card.s && card.v === L.v + 1;
}
function allMoves(b) {
  var mv = [];
  for (var r = 0; r < 4; r++)
    for (var c = 0; c < 13; c++) if (b[r][c])
      for (var gr = 0; gr < 4; gr++)
        for (var gc = 0; gc < 13; gc++)
          if (!b[gr][gc] && canPlace(b[r][c], gr, gc, b))
            mv.push({fr: r, fc: c, tr: gr, tc: gc});
  return mv;
}
function targetsFor(sr, sc) {
  var card = board[sr][sc]; if (!card) return [];
  var t = [];
  for (var r = 0; r < 4; r++)
    for (var c = 0; c < 13; c++)
      if (!board[r][c] && canPlace(card, r, c, board))
        t.push({row: r, col: c});
  return t;
}
function isOk(r, c) {
  for (var i = 0; i < vtg.length; i++)
    if (vtg[i].row === r && vtg[i].col === c) return true;
  return false;
}

function isWin(b) {
  for (var r = 0; r < 4; r++) {
    if (b[r][12] !== null) return false;
    var f = b[r][0]; if (!f || f.v !== 2) return false;
    var s = f.s;
    for (var c = 0; c < 12; c++) { var x = b[r][c]; if (!x || x.s !== s || x.v !== c + 2) return false; }
  }
  return true;
}
function isDead(b) {
  for (var r = 0; r < 4; r++)
    for (var c = 0; c < 13; c++) {
      if (b[r][c]) continue;
      if (c === 0) return false;
      var L = b[r][c - 1]; if (!L || L.v !== 13) return false;
    }
  return true;
}

function cpB(b) {
  var n = [];
  for (var r = 0; r < 4; r++) {
    var row = [];
    for (var c = 0; c < 13; c++) row.push(b[r][c] ? {s: b[r][c].s, v: b[r][c].v} : null);
    n.push(row);
  }
  return n;
}
function enc(b) {
  var s = '';
  for (var r = 0; r < 4; r++)
    for (var c = 0; c < 13; c++) { var x = b[r][c]; s += (x ? x.s * 14 + x.v : 0) + ','; }
  return s;
}
function apMv(b, m) {
  var n = cpB(b); n[m.tr][m.tc] = n[m.fr][m.fc]; n[m.fr][m.fc] = null; return n;
}
function ms(b, m) {
  var c = b[m.fr][m.fc];
  if (m.tc === 0 && c.v === 2) return -1;
  if (m.tc > 0) { var L = b[m.tr][m.tc - 1]; if (L && L.s === c.s && L.v === c.v - 1) return -2; }
  return 0;
}
var MG = 25000, MS = 400000;
function solve(initB, maxSt, tf, cb) {
  var vis = {}, stack = [{b: cpB(initB), f: null}], n = 0;
  function step() {
    var t0 = Date.now();
    while (stack.length && n < maxSt) {
      var it = stack.pop(), cur = it.b, first = it.f; n++;
      var key = enc(cur);
      if (vis[key]) continue; vis[key] = 1;
      if (isWin(cur)) { cb(true, n, first); return; }
      if (isDead(cur)) continue;
      var mv = allMoves(cur); if (!mv.length) continue;
      mv.sort(function(a, bb) { return ms(cur, bb) - ms(cur, a); });
      for (var i = 0; i < mv.length; i++) {
        var nb = apMv(cur, mv[i]);
        if (!vis[enc(nb)]) stack.push({b: nb, f: tf ? (first || mv[i]) : null});
      }
      if (Date.now() - t0 > 20) { setTimeout(step, 0); return; }
    }
    cb(false, n, null);
  }
  setTimeout(step, 0);
}

function newGame() {
  sel = null; vtg = []; hint = null; busy = false;
  setMsg(''); setSub('Verification en cours...');
  setBtns(false);
  var cand = mkBoard();
  board = cand;
  render();
  verify(cand, 0);
}
function verify(cand, att) {
  solve(cand, MG, false, function(found, n) {
    if (found) {
      if (board === cand) {
        setSub('Partie verifiee (tentative ' + (att + 1) + ', ' + n + ' etats)');
        setBtns(true);
      }
    } else {
      var next = mkBoard();
      board = next; render(); verify(next, att + 1);
    }
  });
}
function setBtns(on) {
  document.getElementById('btn-new').disabled     = !on;
  document.getElementById('btn-analyze').disabled = !on;
  document.getElementById('btn-hint').disabled    = !on;
}
function setMsg(t) { document.getElementById('msg').textContent = t; }
function setSub(t) { document.getElementById('sub').textContent = t; }

function analyzeGame() {
  if (busy) return;
  busy = true; hint = null; setBtns(false); setMsg('Analyse...');
  var snap = cpB(board);
  solve(snap, MS, false, function(found, n) {
    busy = false; setBtns(true);
    if (found)  setMsg('Position jouable (' + n + ' etats)');
    else if (isDead(snap) || n < MS) setMsg('Aucune solution depuis ici.');
    else setMsg('Inconclusif apres ' + n + ' etats.');
  });
}

function showHint() {
  if (busy) return;
  busy = true; hint = null; setBtns(false); setMsg('Recherche du meilleur coup...'); render();
  var snap = cpB(board);
  solve(snap, MS, true, function(found, n, first) {
    busy = false; setBtns(true);
    if (found && first) {
      hint = first;
      var c = board[first.fr][first.fc];
      setMsg('Deplacez ' + RANKS[c.v] + SUITS[c.s]
        + ' (R' + (first.fr + 1) + 'C' + (first.fc + 1) + ')'
        + ' -> R' + (first.tr + 1) + 'C' + (first.tc + 1));
    } else if (!found) {
      setMsg('Aucune solution - partie perdue.');
    } else {
      setMsg('Essayez de continuer.');
    }
    render();
  });
}

function handleClick(r, c) {
  var cell = board[r][c];
  if (cell === null) {
    if (sel && isOk(r, c)) doMove(sel.row, sel.col, r, c);
    return;
  }
  if (sel && sel.row === r && sel.col === c) { sel = null; vtg = []; render(); return; }
  sel = {row: r, col: c}; vtg = targetsFor(r, c); hint = null; render();
}
function doMove(fr, fc, tr, tc) {
  board[tr][tc] = board[fr][fc]; board[fr][fc] = null;
  sel = null; vtg = []; hint = null;
  if (isWin(board)) setMsg('Bravo ! Vous avez gagne !');
  else if (!allMoves(board).length)
    setMsg(isDead(board) ? 'Tous les espaces derriere des Rois.' : 'Aucun mouvement possible.');
  render();
}

var dragSrc = null;
function onDS(e, r, c) {
  dragSrc = {row: r, col: c}; sel = {row: r, col: c}; vtg = targetsFor(r, c); hint = null;
  e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text', '');
  var self = e.currentTarget;
  setTimeout(function() { self.style.opacity = '0.3'; render(); }, 0);
}
function onDE(e) { if (e.currentTarget) e.currentTarget.style.opacity = ''; if (dragSrc) { sel = null; vtg = []; dragSrc = null; render(); } }
function onDO(e, r, c) { if (isOk(r, c)) { e.preventDefault(); e.currentTarget.className = 'gap ok dov'; } }
function onDL(e) { e.currentTarget.className = e.currentTarget.className.replace(' dov',''); }
function onDrop(e, r, c) {
  e.preventDefault();
  if (dragSrc && isOk(r, c)) { dragSrc = null; doMove(sel.row, sel.col, r, c); }
  else { dragSrc = null; sel = null; vtg = []; render(); }
}

var tsrc = null, tghW = 0, tghH = 0;
function onTS(e, r, c) {
  e.preventDefault();
  tsrc = {row: r, col: c}; sel = {row: r, col: c}; vtg = targetsFor(r, c); hint = null;
  var el = e.currentTarget, rect = el.getBoundingClientRect();
  tghW = rect.width; tghH = rect.height;
  var gh = document.getElementById('gh');
  gh.innerHTML = el.innerHTML;
  gh.style.width = tghW + 'px'; gh.style.height = tghH + 'px';
  gh.style.fontSize = FS + 'px';
  gh.style.color = RED[board[r][c].s] ? '#cc0000' : '#111';
  gh.style.display = 'flex';
  movGhost(e.touches[0]);
  render();
}
function onTM(e) { e.preventDefault(); movGhost(e.touches[0]); }
function movGhost(t) {
  var gh = document.getElementById('gh');
  gh.style.left = (t.clientX - tghW / 2) + 'px';
  gh.style.top  = (t.clientY - tghH / 2) + 'px';
}
function onTE(e) {
  e.preventDefault();
  document.getElementById('gh').style.display = 'none';
  if (!tsrc) return;
  var t = e.changedTouches[0];
  var el = document.elementFromPoint(t.clientX, t.clientY);
  var found = null;
  for (var i = 0; i < 6 && el; i++) {
    if (el.getAttribute && el.getAttribute('data-r') !== null) { found = el; break; }
    el = el.parentNode;
  }
  var dropped = false;
  if (found) {
    var tr = parseInt(found.getAttribute('data-r'), 10);
    var tc = parseInt(found.getAttribute('data-c'), 10);
    if (isOk(tr, tc)) { var ss = tsrc; tsrc = null; doMove(ss.row, ss.col, tr, tc); dropped = true; }
  }
  if (!dropped) { tsrc = null; sel = null; vtg = []; render(); }
}

function render() {
  var bo = document.getElementById('board');
  var html = '<table style="border-spacing:' + SPC + 'px"><tbody>';
  for (var r = 0; r < 4; r++) {
    html += '<tr>';
    for (var c = 0; c < 13; c++) {
      var cell = board[r][c];
      if (cell === null) {
        var iH = hint && hint.tr === r && hint.tc === c;
        var iO = isOk(r, c);
        html += '<td>'
          + '<div class="gap' + (iO ? ' ok' : '') + (iH ? ' hdst' : '') + '"'
          + ' data-r="' + r + '" data-c="' + c + '"'
          + ' style="width:' + CW + 'px;height:' + CH + 'px">'
          + '</div></td>';
      } else {
        var iS = sel && sel.row === r && sel.col === c;
        var iHc = hint && hint.fr === r && hint.fc === c;
        var cls = 'card ' + (RED[cell.s] ? 'red' : 'black') + (iS ? ' sel' : '') + (iHc && !iS ? ' hint' : '');
        var rank = RANKS[cell.v], suit = SUITS[cell.s];
        var inner = '';
        if (cell.v >= 11) {
          var icon = FICON[cell.v][RED[cell.s] ? 0 : 1];
          inner = '<div class="mf"><div class="fb" style="background:' + FBG[cell.s] + '">'
            + '<span style="font-size:' + FSF + 'px;line-height:1">' + icon + '</span>'
            + '<span style="font-size:' + FSL + 'px;font-style:italic;opacity:.7">' + FNAME[cell.v] + '</span>'
            + '<span style="font-size:' + FSS + 'px;line-height:1">' + suit + '</span>'
            + '</div></div>';
        } else {
          inner = '<div class="mid" style="font-size:' + FSS + 'px">' + suit + '</div>';
        }
        html += '<td><div class="' + cls + '"'
          + ' style="width:' + CW + 'px;height:' + CH + 'px;font-size:' + FS + 'px"'
          + ' data-r="' + r + '" data-c="' + c + '">'
          + '<div style="font-size:' + FS + 'px;line-height:1.15">' + rank + '<br>' + suit + '</div>'
          + inner
          + '<div style="font-size:' + FS + 'px;line-height:1.15;transform:rotate(180deg);text-align:right;margin-left:auto">' + rank + '<br>' + suit + '</div>'
          + '</div></td>';
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  bo.innerHTML = html;

  var cells = bo.querySelectorAll('[data-r]');
  for (var i = 0; i < cells.length; i++) {
    (function(el) {
      var rr = parseInt(el.getAttribute('data-r'), 10);
      var cc = parseInt(el.getAttribute('data-c'), 10);
      el.addEventListener('click', function() { handleClick(rr, cc); });
      if (el.classList.contains('gap')) {
        el.addEventListener('dragover',  function(e) { onDO(e, rr, cc); });
        el.addEventListener('dragleave', onDL);
        el.addEventListener('drop',      function(e) { onDrop(e, rr, cc); });
      } else {
        el.draggable = true;
        el.addEventListener('dragstart', function(e) { onDS(e, rr, cc); });
        el.addEventListener('dragend',   onDE);
        el.addEventListener('touchstart', function(e) { onTS(e, rr, cc); }, {passive: false});
        el.addEventListener('touchmove',  onTM, {passive: false});
        el.addEventListener('touchend',   onTE, {passive: false});
      }
    })(cells[i]);
  }
}

newGame();
</script>
</body>
</html>
